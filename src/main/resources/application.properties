server.port=8085

# Native .env importing
spring.config.import=optional:file:.env[.properties], optional:file:../.env[.properties]

# Database Configuration (Accepts Render Environment Variables if set, else falls back to Localhost)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.mysql.cj.jdbc.Driver}

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwtSecret=${APP_JWT_SECRET}
app.jwtExpirationMs=86400000

# CORS Support
app.cors.allowedOrigins=${FRONTEND_URL:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:3000}

# Twilio Configuration
twilio.account_sid=${TWILIO_ACCOUNT_SID}
twilio.auth_token=${TWILIO_AUTH_TOKEN}
twilio.phone_number=${TWILIO_PHONE_NUMBER}

# Hugging Face AI Configuration
huggingface.api.key=${HUGGINGFACE_API_KEY}
huggingface.model.url=https://router.huggingface.co/v1/chat/completions
huggingface.model.name=meta-llama/Llama-3.1-8B-Instruct
